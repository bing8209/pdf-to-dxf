name: Cloud Build EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        matplotlib
        pip install PyQt5 PyMuPDF ezdxf pyinstaller

    - name: Build with PyInstaller
      run: |
        # 建议这里 --name 后面用英文 "PDF_to_DXF_Tool"，规避 Windows 虚拟机的中文路径报错风险
        # 注意：末尾的脚本文件名（如 pdf_to_dxf_tool.py）必须和你代码仓库里的文件名一模一样
        pyinstaller --clean --noconsole --onefile --name "PDF_to_DXF_Tool" pdf_to_dxf_tool.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF转DXF工具_EXE_安装包  # 下载时的压缩包名字可以叫中文
        path: dist/PDF_to_DXF_Tool.exe  # 对应的路径也改成了英文
