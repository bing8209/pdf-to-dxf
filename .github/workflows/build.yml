name: Cloud Build EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 已修正：将 matplotlib 正确加入到 pip 安装命令中
        pip install PyQt5 PyMuPDF ezdxf pyinstaller matplotlib

    - name: Build with PyInstaller
      run: |
        # 注意：末尾的脚本文件名（如 pdf_to_dxf_tool.py）必须和你代码仓库里的文件名一模一样
        pyinstaller --clean --noconsole --onefile --name "PDF_to_DXF_Tool" pdf_to_dxf_tool.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF_to_DXF_Converter_EXE  # 建议下载的压缩包也用英文，防止某些极端情况下解压乱码
        path: dist/PDF_to_DXF_Tool.exe
