name: Cloud Build EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 PyMuPDF ezdxf pyinstaller matplotlib

    - name: Build with PyInstaller
      run: |
        # 💡 【核心修复点】加入了 --hidden-import 参数，强行把 matplotlib 的 PDF 导出后端打包进去
        pyinstaller --clean --noconsole --onefile --hidden-import="matplotlib.backends.backend_pdf" --name "PDF_to_DXF_Tool" pdf_to_dxf_tool.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF_to_DXF_Converter_EXE
        path: dist/PDF_to_DXF_Tool.exe
